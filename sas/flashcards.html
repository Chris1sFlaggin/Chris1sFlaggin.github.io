<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flashcard SAS — Auto-test</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --card:#1d212b; --card2:#232838;
    --ink:#e8ebf1; --muted:#9aa3b2; --line:#2a2f3a;
    --accent:#5b8cff; --good:#2fbf71; --again:#ff6b6b; --chip:#2a3146;
    --shadow:0 10px 30px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 600px at 50% -10%,#1a1f2b,var(--bg));
    color:var(--ink);
    font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column;min-height:100vh;
  }
  header{
    padding:18px 20px 10px;border-bottom:1px solid var(--line);
    display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;
  }
  h1{font-size:18px;margin:0;letter-spacing:.3px}
  h1 small{color:var(--muted);font-weight:500}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  select,button{
    font:inherit;color:var(--ink);background:var(--panel);
    border:1px solid var(--line);border-radius:10px;padding:8px 12px;cursor:pointer;
    transition:.15s border-color,.15s background,.15s transform;
  }
  button:hover,select:hover{border-color:var(--accent)}
  button:active{transform:translateY(1px)}
  .progress{height:6px;background:var(--panel);border-bottom:1px solid var(--line)}
  .progress > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),#7aa2ff);transition:width .25s}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px 16px}
  .meta{color:var(--muted);font-size:13px;display:flex;gap:14px;align-items:center}
  .scene{width:min(760px,94vw);height:min(52vh,520px);perspective:1400px}
  .card{
    position:relative;width:100%;height:100%;cursor:pointer;
    transform-style:preserve-3d;transition:transform .5s cubic-bezier(.2,.7,.2,1);
  }
  .card.flip{transform:rotateY(180deg)}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;
    border:1px solid var(--line);box-shadow:var(--shadow);
    padding:28px 30px;display:flex;flex-direction:column;
  }
  .front{background:linear-gradient(160deg,var(--card),#161a23);overflow:auto}
  .back{background:linear-gradient(160deg,var(--card2),#1a1f2c);transform:rotateY(180deg);overflow:auto}
  .back .body{align-items:flex-start}
  .chip{
    align-self:flex-start;font-size:12px;letter-spacing:.4px;text-transform:uppercase;
    color:#cdd6ea;background:var(--chip);border:1px solid var(--line);
    padding:4px 10px;border-radius:999px;margin-bottom:14px;
  }
  .qid{color:var(--muted);font-size:12px;margin-bottom:6px}
  .body{flex:1;display:flex;align-items:center}
  .q{font-size:clamp(18px,2.6vw,24px);font-weight:600}
  .q img{display:block;margin:12px auto 0;max-width:100%;max-height:30vh;background:#fff;border-radius:8px;padding:6px}
  .a{font-size:clamp(15px,2.1vw,19px)}
  .a b{color:#fff}
  .a .ex{display:block;margin-top:8px;color:#bfe6cd}
  .a .ex b{color:#7ee0a0}
  .a img{display:block;margin:12px auto 0;max-width:100%;max-height:30vh;
         background:#fff;border-radius:8px;padding:6px}
  .a .ps{font-size:clamp(13px,1.8vw,16px);color:var(--muted)}
  .a .ps b{color:var(--ink)}
  .hint{color:var(--muted);font-size:12px;text-align:center;margin-top:14px}
  .markstate{position:absolute;top:14px;right:16px;font-size:12px;font-weight:700}
  .markstate.known{color:var(--good)}
  .markstate.again{color:var(--again)}
  .nav{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;align-items:center}
  .nav .big{padding:10px 18px;font-weight:600}
  .btn-good{border-color:#235; color:var(--good)}
  .btn-good:hover{border-color:var(--good);background:rgba(47,191,113,.08)}
  .btn-again{color:var(--again)}
  .btn-again:hover{border-color:var(--again);background:rgba(255,107,107,.08)}
  .stats{color:var(--muted);font-size:13px}
  .stats b{color:var(--ink)}
  footer{padding:10px 16px;color:var(--muted);font-size:12px;text-align:center;border-top:1px solid var(--line)}
  kbd{background:var(--panel);border:1px solid var(--line);border-bottom-width:2px;border-radius:6px;padding:1px 6px;font-size:11px}
  .empty{color:var(--muted);text-align:center}
</style>
</head>
<body>
<header>
  <h1>Flashcard SAS <small>— auto-test</small></h1>
  <div class="controls">
    <select id="cat" title="Filtra per categoria"></select>
    <button id="shuffle" title="Mescola">🔀 Mescola</button>
    <button id="onlyAgain" title="Mostra solo le card da rivedere">↻ Solo da rivedere</button>
    <button id="reset" title="Azzera progressi">🗑 Reset</button>
  </div>
</header>
<div class="progress"><i id="bar"></i></div>

<main>
  <div class="meta">
    <span id="counter">–</span>
    <span class="stats">✔ <b id="nKnown">0</b> &nbsp; ↻ <b id="nAgain">0</b></span>
  </div>

  <div class="scene">
    <div class="card" id="card">
      <div class="face front">
        <span class="chip" id="catChip">—</span>
        <span class="markstate" id="markFront"></span>
        <div class="qid" id="qid"></div>
        <div class="body"><div class="q" id="q">—</div></div>
        <div class="hint">clicca o premi <kbd>Spazio</kbd> per girare</div>
      </div>
      <div class="face back">
        <span class="chip" id="catChip2">Risposta</span>
        <span class="markstate" id="markBack"></span>
        <div class="body"><div class="a" id="a">—</div></div>
        <div class="hint">↻ <kbd>←</kbd> indietro &nbsp;·&nbsp; <kbd>→</kbd> avanti</div>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="big" id="prev">← Indietro</button>
    <button class="big" id="flip">Gira</button>
    <button class="big" id="next">Avanti →</button>
  </div>
  <div class="nav">
    <button class="btn-good" id="markKnown" title="Sapevo (G)">✔ Sapevo</button>
    <button class="btn-again" id="markAgain" title="Da rivedere (A)">↻ Da rivedere</button>
  </div>
</main>

<footer>
  92 card · scorciatoie: <kbd>←</kbd>/<kbd>→</kbd> naviga · <kbd>Spazio</kbd> gira · <kbd>G</kbd> sapevo · <kbd>A</kbd> da rivedere · <kbd>S</kbd> mescola
</footer>

<script>
const CARDS = [
 {id:"A1",cat:"Processi",q:"Quali sono le 4 attività fondamentali di un processo software?",a:"Le 4 cose che fai in QUALSIASI progetto software: <b>1) Specifica</b> = decidere cosa deve fare. <b>2) Sviluppo</b> = progettarlo e scrivere il codice. <b>3) Convalida</b> = testare che funzioni davvero. <b>4) Evoluzione</b> = modificarlo dopo, quando cambiano i bisogni.<span class='ex'><b>Esempio:</b> app meteo → scegli «mostra previsioni» (specifica), la programmi (sviluppo), controlli che i dati siano giusti (convalida), poi aggiungi le allerte (evoluzione).</span>"},
 {id:"A2",cat:"Processi",q:"Che differenza c'è tra modello a cascata e modello incrementale?",a:"<b>Cascata:</b> fai le 4 attività in fila, una finita inizi la prossima, senza tornare indietro. <b>Incrementale:</b> le ripeti a piccoli pezzi, ogni giro aggiunge funzioni e puoi correggere.<span class='ex'><b>Esempio:</b> cascata = costruisci tutta la casa dal progetto finale e basta; incrementale = prima una stanza abitabile, poi ne aggiungi altre una alla volta.</span>"},
 {id:"A3",cat:"Processi",q:"Quali sono le 4 fasi di UP (Unified Process)?",a:"<b>Ideazione</b> (idea + è fattibile?) → <b>Elaborazione</b> (decidi architettura e affronti i rischi grossi) → <b>Costruzione</b> (scrivi la maggior parte del codice) → <b>Transizione</b> (consegni agli utenti).<span class='ex'><b>Memo:</b> I-E-C-T. UP è iterativo: queste fasi si attraversano facendo più giri (iterazioni).</span>"},
 {id:"A4",cat:"Processi",q:"In UP le attività (requisiti, progettazione, test…) sono separate nel tempo?",a:"<b>NO.</b> In UP non sono blocchi separati: in ogni iterazione ne fai un po' di tutte insieme. («non si intrecciano mai» = <b>FALSO</b>.)<span class='ex'><b>Esempio:</b> mentre scrivi codice ti accorgi che manca un requisito e torni subito a sistemarlo, senza aspettare una «fase requisiti» chiusa.</span>"},
 {id:"A5",cat:"Processi",q:"UP usa il refactoring?",a:"<b>SÌ (VERO).</b> Refactoring = ripulire/riorganizzare il codice senza cambiare cosa fa, per tenerlo gestibile. UP lo usa perché è iterativo e il codice cambia di continuo.<span class='ex'><b>Esempio:</b> rinomini variabili confuse e spezzi un metodo lungo 200 righe in tre più piccoli: stesso risultato, codice più pulito.</span>"},

 {id:"B1",cat:"Requisiti",q:"Un caso d'uso è «l'insieme di tutte le funzionalità del sistema»?",a:"<b>FALSO.</b> Un caso d'uso = UN modo di usare il sistema per raggiungere UN obiettivo di un utente. Non tutte le funzioni insieme.<span class='ex'><b>Esempio:</b> «Prelevare contante» è UN caso d'uso del bancomat. «Tutto quello che fa il bancomat» NON è un caso d'uso.</span>"},
 {id:"B2",cat:"Requisiti",q:"I requisiti non funzionali sono descritti completamente dai casi d'uso?",a:"<b>FALSO.</b> I casi d'uso dicono COSA fa il sistema (requisiti funzionali). Le qualità e i vincoli (velocità, sicurezza, usabilità = non funzionali) vanno nelle <b>Specifiche Supplementari</b>.<span class='ex'><b>Esempio:</b> «login» = caso d'uso; «il login deve rispondere in meno di 1 secondo» = requisito non funzionale → specifiche supplementari.</span>"},
 {id:"B3",cat:"Requisiti",q:"A cosa serve la disciplina dei requisiti in UP?",a:"A capire COSA costruire prima di costruirlo: fare la lista dei requisiti, capire il contesto del sistema, raccogliere requisiti <b>funzionali</b> e <b>non funzionali</b>.<span class='ex'><b>Esempio:</b> per un'app di prenotazioni capisci chi la usa, cosa deve fare e quali vincoli (es. deve girare su mobile) prima di programmare.</span>"},

 {id:"C1",cat:"Dominio",q:"Cos'è il modello di dominio?",a:"È un disegno (UML) che fa da <b>dizionario visuale</b> dei concetti del mondo reale del problema, con le loro relazioni. NON è codice.<span class='ex'><b>Esempio:</b> per un negozio → i concetti Cliente, Ordine, Prodotto e come si collegano (un Cliente fa Ordini, un Ordine contiene Prodotti).</span>"},
 {id:"C2",cat:"Dominio",q:"Il modello di dominio include oggetti e attributi software?",a:"<b>FALSO.</b> Mostra concetti del <b>mondo reale</b> (concettuali), non le classi/metodi del programma.<span class='ex'><b>Esempio:</b> «Cliente» come idea del dominio — non la classe Java <code>Cliente</code> con i suoi metodi e tipi. Quella arriva dopo, nel design.</span>"},
 {id:"C3",cat:"Dominio",q:"Il modello di dominio è testuale o visuale?",a:"È <b>visuale</b>: un diagramma UML fatto di scatole e linee. «rappresentazione testuale» = <b>FALSO</b>.<span class='ex'><b>Esempio:</b> non è un elenco scritto «Cliente: nome, cognome…», ma un disegno con le scatole Cliente–Ordine collegate.</span>"},
 {id:"C4",cat:"Dominio",q:"Da dove nascono i concetti del modello di dominio?",a:"Dai casi d'uso scritti in dettaglio: leggi il testo e i <b>sostantivi</b> ti suggeriscono i concetti.<span class='ex'><b>Esempio:</b> dalla frase «il cliente effettua un ordine di prodotti» tiri fuori i concetti Cliente, Ordine, Prodotto.</span>"},

 {id:"D1",cat:"Riuso",q:"Un attributo di una classe è una responsabilità di che tipo?",a:"Di <b>conoscenza</b> (knowing): un attributo è qualcosa che l'oggetto «sa». (VERO.)<span class='ex'><b>Esempio:</b> un Conto «sa» il proprio saldo → il saldo è una responsabilità di conoscenza. «Fare un bonifico» invece è una responsabilità di esecuzione (doing).</span>"},
 {id:"D2",cat:"Riuso",q:"I pattern GRASP servono a scoprire i requisiti?",a:"<b>FALSO.</b> I GRASP servono nel <b>design</b>, per decidere quale classe ha quale responsabilità. Non servono a capire cosa vuole il cliente.<span class='ex'><b>Memo:</b> GRASP = «COME progetto» (chi fa cosa), non «COSA serve». I requisiti li raccogli prima, con i casi d'uso.</span>"},
 {id:"D3",cat:"Riuso",q:"La composizione/delega è riuso black-box o white-box?",a:"<b>Black-box</b> (scatola nera): usi un oggetto tramite la sua interfaccia senza vederne l'interno. Rispetta l'incapsulamento.<span class='ex'><b>Esempio:</b> usi una <code>List</code> di Java senza sapere com'è fatta dentro: ti basta <code>add()</code> e <code>get()</code>.</span>"},
 {id:"D4",cat:"Riuso",q:"L'ereditarietà rispetta l'incapsulamento?",a:"<b>FALSO.</b> L'ereditarietà è <b>white-box</b>: la sottoclasse vede i dettagli interni del padre, quindi non rispetta del tutto l'incapsulamento.<span class='ex'><b>Esempio:</b> se cambi come funziona dentro la classe padre, rischi di rompere tutte le classi figlie che ci si appoggiavano.</span>"},
 {id:"D5",cat:"Riuso",q:"I GoF usano l'ereditarietà per il polimorfismo? E per riusare il codice?",a:"Per il <b>polimorfismo</b> sì (interfacce e classi astratte). Per <b>riusare il codice</b> preferiscono la <b>composizione</b> (un oggetto ne contiene un altro).<span class='ex'><b>Slogan GoF:</b> «favorisci la composizione sull'ereditarietà» — incastri oggetti invece di fare gerarchie profonde e rigide.</span>"},

 {id:"E1",cat:"GRASP",q:"«Chi deve creare l'istanza di un oggetto?» — quale GRASP?",a:"<b>Creator.</b> Lo crea la classe che lo contiene, lo aggrega o lo usa di più.<span class='ex'><b>Esempio:</b> un Ordine contiene le sue RigheOrdine → è l'Ordine a creare le righe, non una classe a caso. Chi «possiede» il pezzo, lo fabbrica.</span>"},
 {id:"E2",cat:"GRASP",q:"«Assegna il compito a chi ha le informazioni per farlo» — quale GRASP?",a:"<b>Information Expert.</b> Dai la responsabilità alla classe che ha già i dati necessari.<span class='ex'><b>Esempio:</b> per calcolare il totale di un Ordine, lo fa l'Ordine stesso, perché ha la lista delle righe e i prezzi. Inutile farlo fare a un'altra classe che dovrebbe chiedere tutto.</span>"},
 {id:"E3",cat:"GRASP",q:"«Primo oggetto, oltre la UI, che riceve un'operazione di sistema» — quale GRASP?",a:"<b>Controller.</b> L'oggetto (non la finestra/bottone) che riceve l'azione dell'utente e la smista al resto del sistema.<span class='ex'><b>Esempio:</b> premi «Paga» → un oggetto GestoreVendita riceve la richiesta e coordina; il bottone non fa il lavoro, solo lo passa.</span>"},
 {id:"E4",cat:"GRASP",q:"«Tieni le classi poco dipendenti tra loro» — quale GRASP?",a:"<b>Low Coupling</b> (accoppiamento basso). Meno una classe dipende dalle altre, meno cose rompi quando la cambi.<span class='ex'><b>Esempio:</b> se A parla con B solo tramite un'interfaccia, puoi sostituire B con un altro senza toccare A.</span>"},
 {id:"E5",cat:"GRASP",q:"«Ogni classe fa una cosa sola e ben definita» — quale GRASP?",a:"<b>High Cohesion</b> (coesione alta). Una classe deve avere responsabilità correlate, non un po' di tutto.<span class='ex'><b>Esempio:</b> una classe Fattura gestisce la fattura — non anche l'invio email, la stampa e l'accesso al database. Quelle vanno in classi dedicate.</span>"},
 {id:"E11",cat:"GRASP",q:"«Abstract Factory è un pattern GRASP» — Vero o Falso?",a:"<b>FALSO.</b> Abstract Factory è un <b>GoF</b> (serve a creare oggetti), non un GRASP.<span class='ex'><b>Trappola classica d'esame:</b> i GRASP sono 9 e riguardano l'assegnazione di responsabilità. Se in un elenco di «GRASP» vedi Abstract Factory, Singleton o Observer → sono GoF, quindi FALSO.</span>"},

 {id:"F1",cat:"GoF",q:"«Famiglia di algoritmi variabili e intercambiabili» — quale pattern GoF?",a:"<b>Strategy.</b> Diversi modi di fare la stessa cosa, scambiabili a piacere.<span class='ex'><b>Esempio:</b> il navigatore calcola lo stesso percorso con strategia «auto», «bici» o «a piedi». Cambi la strategia, il resto del programma non cambia.</span>"},
 {id:"F2",cat:"GoF",q:"«Aggiungere responsabilità a un oggetto in modo dinamico» — quale pattern GoF?",a:"<b>Decorator</b> (detto anche Wrapper). Aggiungi funzioni «avvolgendo» l'oggetto, invece di creare mille sottoclassi.<span class='ex'><b>Esempio:</b> caffè base → lo avvolgi con «+latte», poi con «+panna». Ogni strato aggiunge prezzo e descrizione, a runtime.</span>"},
 {id:"F3",cat:"GoF",q:"«Far funzionare insieme interfacce incompatibili» — quale pattern GoF?",a:"<b>Adapter.</b> Metti un adattatore in mezzo per far combaciare due «prese» diverse.<span class='ex'><b>Esempio:</b> come l'adattatore presa italiana→inglese. Nel codice: avvolgi una libreria vecchia per usarla con la tua interfaccia nuova senza riscriverla.</span>"},
 {id:"F4",cat:"GoF",q:"«Avvisare più oggetti quando uno cambia stato» — quale pattern GoF?",a:"<b>Observer</b> (publish-subscribe). Un oggetto notifica automaticamente quelli iscritti quando succede qualcosa.<span class='ex'><b>Esempio:</b> ti iscrivi a un canale YouTube (subscriber). Esce un video (evento) → ricevi la notifica, senza dover controllare ogni minuto.</span>"},
 {id:"F5",cat:"GoF",q:"«Il comportamento cambia in base allo stato interno» — quale pattern GoF?",a:"<b>State.</b> L'oggetto si comporta in modo diverso secondo il suo stato, senza riempire tutto di if.<span class='ex'><b>Esempio:</b> un semaforo verde/giallo/rosso: lo stesso comando «prossimo()» fa cose diverse a seconda dello stato corrente.</span>"},
 {id:"F6",cat:"GoF",q:"«Trattare un gruppo e un singolo allo stesso modo (ad albero)» — quale pattern GoF?",a:"<b>Composite.</b> Composti e singoli condividono la stessa interfaccia, così li usi nello stesso modo.<span class='ex'><b>Esempio:</b> una cartella contiene file e altre cartelle; chiedi la «dimensione» a un file o a una cartella con lo stesso comando.</span>"},
 {id:"F7",cat:"GoF",q:"«Una sola istanza, raggiungibile da ovunque» — quale pattern GoF?",a:"<b>Singleton.</b> Garantisce che esista UN solo oggetto di quella classe in tutto il programma.<span class='ex'><b>Esempio:</b> le impostazioni dell'app o il logger: ne vuoi uno solo, condiviso da tutti, non venti copie scollegate.</span>"},
 {id:"F8",cat:"GoF",q:"«Creare famiglie di oggetti coordinati» — quale pattern GoF?",a:"<b>Abstract Factory.</b> Crea gruppi di oggetti che vanno insieme, senza dire le classi concrete.<span class='ex'><b>Esempio:</b> tema chiaro vs scuro → la factory «chiara» crea bottoni e sfondi chiari, quella «scura» tutti scuri, sempre coerenti tra loro.</span>"},
 {id:"F9",cat:"GoF",q:"«Aggiungere operazioni senza modificare le classi esistenti» — quale pattern GoF?",a:"<b>Visitor.</b> Metti la nuova operazione in un oggetto «visitatore» invece di toccare ogni classe.<span class='ex'><b>Esempio:</b> hai già le classi Forma. Vuoi una nuova operazione «esporta in SVG»: la scrivi in un Visitor, senza modificare Cerchio, Quadrato, ecc.</span>"},
 {id:"F10",cat:"GoF",q:"Quali sono le 3 categorie dei pattern GoF?",a:"<b>Creazionali</b> (come creare oggetti): Singleton, Abstract Factory. <b>Strutturali</b> (come comporre classi/oggetti): Adapter, Composite, Decorator. <b>Comportamentali</b> (come interagiscono): Observer, State, Strategy, Visitor.<span class='ex'><b>Memo:</b> Creo / Costruisco la struttura / Faccio interagire.</span>"},

 {id:"G1",cat:"State vs Strategy",q:"«Strategy incapsula un algoritmo» — Vero o Falso?",a:"<b>VERO.</b> Strategy racchiude un <b>algoritmo</b>, cioè un modo di svolgere un compito, e te ne fa scegliere uno.<span class='ex'><b>Esempio:</b> l'algoritmo di ordinamento o di calcolo del prezzo: ne scegli uno tra tanti.</span>"},
 {id:"G2",cat:"State vs Strategy",q:"«State incapsula un algoritmo» — Vero o Falso?",a:"<b>FALSO.</b> State racchiude il <b>comportamento legato allo stato</b>, non un algoritmo scelto dal cliente.<span class='ex'><b>Esempio:</b> come si comporta un Ordine se è «in attesa» rispetto a «spedito»: cambia da solo col cambiare dello stato.</span>"},
 {id:"G3",cat:"State vs Strategy",q:"«State consente una famiglia di algoritmi intercambiabili» — Vero o Falso?",a:"<b>FALSO.</b> La «famiglia di algoritmi intercambiabili» è <b>Strategy</b>, non State.<span class='ex'><b>Trappola:</b> all'esame scambiano apposta le definizioni di State e Strategy. Ricorda: algoritmi scambiabili = Strategy.</span>"},
 {id:"G4",cat:"State vs Strategy",q:"«State e Strategy sono simili ma differiscono nell'applicazione» — Vero o Falso?",a:"<b>VERO.</b> Hanno quasi lo stesso disegno UML (Context + interfaccia + classi concrete), ma scopo diverso.<span class='ex'><b>Differenza:</b> Strategy = TU scegli quale algoritmo usare. State = l'oggetto cambia comportamento da solo quando cambia il suo stato interno.</span>"},

 {id:"H1",cat:"Testing",q:"Cos'è il TDD e di quale metodo è pratica?",a:"<b>TDD</b> = scrivi PRIMA il test (che fallisce), poi il codice minimo per farlo passare, poi pulisci. Ciclo: rosso → verde → refactor. È pratica di <b>eXtreme Programming</b>, non della cascata.<span class='ex'><b>Esempio:</b> prima scrivi il test «somma(2,3) deve dare 5», lo vedi fallire, poi scrivi la funzione somma finché diventa verde.</span>"},
 {id:"H2",cat:"Testing",q:"«Un test unitario verifica la comunicazione tra parti del sistema» — Vero o Falso?",a:"<b>FALSO.</b> Il test <b>unitario</b> prova UN pezzo isolato (una classe/metodo). La comunicazione TRA pezzi la prova il test di <b>integrazione</b>.<span class='ex'><b>Esempio:</b> unitario = provi <code>somma()</code> da sola; integrazione = provi che «carrello» e «pagamento» funzionino insieme.</span>"},
 {id:"H3",cat:"Testing",q:"Quali sono le fasi di un test (schema AAA)?",a:"<b>Arrange</b> (prepara i dati) → <b>Act</b> (esegui il metodo da testare) → <b>Assert</b> (controlla che il risultato sia giusto). Non c'è nessun «rilascio».<span class='ex'><b>Esempio:</b> prepari un carrello con 2 articoli (Arrange) → chiami totale() (Act) → verifichi che dia la somma giusta (Assert).</span>"},

 {id:"I1",cat:"Molteplicità UML",q:"Cosa significano 1, 0..1, *, 1..* su un'associazione?",a:"Dicono quanti oggetti si collegano: <b>1</b> = esattamente uno; <b>0..1</b> = zero o uno (opzionale); <b>*</b> o 0..* = zero o più; <b>1..*</b> = almeno uno.<span class='ex'><b>Esempio:</b> un Ordine ha 1 Cliente; un Cliente ha 0..* Ordini (può non averne ancora fatti, o averne tanti).</span>"},
 {id:"I2",cat:"Molteplicità UML",q:"Quando una relazione (insieme di coppie) NON rispetta le molteplicità?",a:"È invalida se: un lato ha più o meno collegamenti di quanti la molteplicità permette, oppure un elemento obbligatorio (1..*) resta senza collegamento, oppure compare due volte la stessa coppia.<span class='ex'><b>Esempio:</b> se ogni Ordine DEVE avere 1 Cliente ma nell'elenco un Ordine non ha nessun Cliente → relazione invalida.</span>"},

 {id:"U1",cat:"GoF — UML",q:"Singleton — Problema, Soluzione e struttura UML?",a:"<div class='ps'><b>Problema:</b> è consentita (o richiesta) esattamente una sola istanza di una classe (un «singleton»); gli altri oggetti hanno bisogno di un punto di accesso globale e singolo a questo oggetto.<br><b>Soluzione:</b> definisci un metodo statico (di classe) della classe che restituisce l'oggetto singleton.</div><img src='notes/gof_singleton.png' alt='Struttura UML Singleton'>"},
 {id:"U2",cat:"GoF — UML",q:"Abstract Factory — Problema, Soluzione e struttura UML?",a:"<div class='ps'><b>Problema:</b> come creare famiglie di classi correlate che implementano un'interfaccia comune?<br><b>Soluzione:</b> definisci un'interfaccia factory (la factory astratta) e una classe factory concreta per ciascuna famiglia di elementi da creare; opzionalmente una classe astratta che implementa l'interfaccia factory e offre servizi comuni alle factory concrete.</div><img src='notes/gof_abstract_factory.png' alt='Struttura UML Abstract Factory'>"},
 {id:"U3",cat:"GoF — UML",q:"Adapter — Problema, Soluzione e struttura UML?",a:"<div class='ps'><b>Problema:</b> come gestire interfacce incompatibili, o fornire un'interfaccia stabile a comportamenti simili ma con interfacce diverse?<br><b>Soluzione:</b> converti l'interfaccia originale di un componente in un'altra interfaccia, attraverso un oggetto adattatore intermedio.</div><img src='notes/gof_adapter.png' alt='Struttura UML Adapter'>"},
 {id:"U4",cat:"GoF — UML",q:"Composite — Problema, Soluzione e struttura UML?",a:"<div class='ps'><b>Problema:</b> come trattare un gruppo o una struttura composta di oggetti (polimorficamente) dello stesso tipo nello stesso modo di un oggetto non composto (atomico)?<br><b>Soluzione:</b> definisci le classi per gli oggetti composti e atomici in modo che implementino la stessa interfaccia.</div><img src='notes/gof_composite.png' alt='Struttura UML Composite'>"},
 {id:"U5",cat:"GoF — UML",q:"Decorator — Problema, Soluzione e struttura UML?",a:"<div class='ps'><b>Problema:</b> come assegnare una o più responsabilità addizionali a un oggetto in maniera dinamica, evitando la rigidità della relazione statica? Come fornire un'alternativa più flessibile alla sottoclasse, evitando una gerarchia di classi complessa?<br><b>Soluzione:</b> ingloba l'oggetto all'interno di un altro che aggiunge le nuove funzionalità. Noto anche come <b>Wrapper</b>.</div><img src='notes/gof_decorator.png' alt='Struttura UML Decorator'>"},
 {id:"U6",cat:"GoF — UML",q:"Observer — Problema, Soluzione e struttura UML?",a:"<div class='ps'><b>Problema:</b> diversi tipi di subscriber (abbonati) sono interessati ai cambiamenti di stato o agli eventi di un publisher; ciascuno vuole reagire a modo proprio e il publisher vuole mantenere un accoppiamento basso verso i subscriber.<br><b>Soluzione:</b> definisci un'interfaccia subscriber/listener implementata dai subscriber; il publisher li registra dinamicamente e li avvisa quando si verifica un evento. Noto anche come <b>Publish-Subscribe</b> / Dependents.</div><img src='notes/gof_observer.png' alt='Struttura UML Observer'>"},
 {id:"U7",cat:"GoF — UML",q:"State — Problema, Soluzione e struttura UML?",a:"<div class='ps'><b>Problema:</b> il comportamento di un oggetto dipende dal suo stato e i suoi metodi sono pieni di logica condizionale che riflette le azioni che dipendono dallo stato. C'è un'alternativa alla logica condizionale?<br><b>Soluzione:</b> crea una classe stato per ciascuno stato, con un'interfaccia comune; delega le operazioni dipendenti dallo stato dal contesto all'oggetto stato corrente, e assicura che il contesto referenzi sempre lo stato che riflette il suo stato attuale.</div><img src='notes/gof_state.png' alt='Struttura UML State'>"},
 {id:"U8",cat:"GoF — UML",q:"Strategy — Problema, Soluzione e struttura UML?",a:"<div class='ps'><b>Problema:</b> come gestire un insieme di algoritmi/politiche variabili ma correlati e consentire di modificarli o scambiarli?<br><b>Soluzione:</b> definisci ciascun algoritmo/politica/strategia in una classe separata, con un'interfaccia comune. Noto anche come <b>Policy</b>.</div><img src='notes/gof_strategy.png' alt='Struttura UML Strategy'>"},
 {id:"U9",cat:"GoF — UML",q:"Visitor — Problema, Soluzione e struttura UML?",a:"<div class='ps'><b>Problema:</b> come separare l'operazione applicata su un contenitore complesso dalla struttura dati cui è applicata, aggiungere nuove operazioni senza modificare la struttura e attraversare elementi eterogenei applicando azioni dipendenti dal loro tipo?<br><b>Soluzione:</b> crea un ConcreteVisitor capace di percorrere la collezione e applicare un proprio metodo su ogni Element visitato; ogni elemento aderisce a un'interfaccia <b>Visitable</b> che gli consente di accettare il visitor (<code>accept</code>). Il visitor analizza il tipo ricevuto e invoca la particolare operazione che deve eseguire.</div><img src='notes/gof_visitor.png' alt='Struttura UML Visitor'>"},

 {id:"S1",cat:"SSD",q:"Cos'è un Diagramma di Sequenza di Sistema (SSD)?",a:"Un diagramma che, per lo scenario di un caso d'uso, mostra gli <b>eventi di sistema</b> (i messaggi) che l'attore manda al sistema, visto come un'unica scatola nera.<span class='ex'><b>Esempio (tuo progetto):</b> l'Organizzatore invia creaEvento(...), poi impostaFrequenza(...) alla lifeline «:Sistema».</span>"},
 {id:"S2",cat:"SSD",q:"Cos'è un'«operazione di sistema»?",a:"Un messaggio che l'attore manda al sistema in un SSD. Nel design diventeranno i <b>metodi del Controller</b>.<span class='ex'><b>Esempio:</b> creaEvento, approvaMenu, terminaEvento → nel codice diventano createEvent(), approveMenu(), terminateEvent() su EventManager.</span>"},
 {id:"S3",cat:"SSD",q:"Nell'SSD il sistema è black-box o white-box?",a:"<b>Black-box</b>: una sola lifeline «:Sistema». NON si vedono le classi interne — solo cosa entra (operazioni) e cosa esce (ritorni).<span class='ex'><b>Differenza:</b> il DSD invece è white-box e mostra gli oggetti interni che collaborano.</span>"},
 {id:"S4",cat:"SSD",q:"Cosa sono le frecce tratteggiate di ritorno in un SSD?",a:"I <b>valori restituiti</b> dal sistema all'attore (opzionali). Freccia piena = operazione richiesta; freccia tratteggiata = risposta.<span class='ex'><b>Esempio:</b> terminaEvento restituisce all'attore un flag «serve la deroga?».</span>"},
 {id:"S5",cat:"SSD",q:"Da dove si ricava un SSD?",a:"Dallo <b>scenario del caso d'uso in formato dettagliato</b> (corso principale + estensioni). Ogni passo in cui l'attore chiede qualcosa al sistema diventa un'operazione di sistema.<span class='ex'><b>Esempio:</b> i tuoi SSD 002/004/005 nascono dalle estensioni 1b/1c/5a/8a del UC3.</span>"},

 {id:"K1",cat:"Contratti",q:"Cos'è il contratto di un'operazione di sistema?",a:"La descrizione dell'<b>effetto</b> di un'operazione tramite <b>pre-condizioni</b> e <b>post-condizioni</b>. Dice COSA cambia nel sistema, non COME.<span class='ex'><b>Esempio:</b> il contratto di creaEvento elenca cosa è vero dopo (evento creato, stato «programmato»), senza dire l'algoritmo.</span>"},
 {id:"K2",cat:"Contratti",q:"Cosa sono le post-condizioni di un contratto?",a:"Lo <b>stato del mondo dopo</b> l'operazione, scritto come se fosse già avvenuto.<span class='ex'><b>Esempio (creaEvento):</b> creata istanza e di Evento; e.stato=«programmato»; l'Organizzatore organizza e; il cliente richiede e.</span>"},
 {id:"K3",cat:"Contratti",q:"Le post-condizioni dicono come implementare l'operazione?",a:"<b>NO.</b> Sono <b>dichiarative</b>: fotografano lo stato dopo, non gli algoritmi né i passi. Il «come» sta nei DSD e nel codice.<span class='ex'><b>Trappola:</b> scrivere «il sistema fa un ciclo e salva nel DB» in un contratto è sbagliato — è implementazione.</span>"},
 {id:"K4",cat:"Contratti",q:"Quali 3 tipi di cambiamento compaiono nelle post-condizioni?",a:"<b>1)</b> Creazione/eliminazione di istanze. <b>2)</b> Associazioni formate o rotte tra oggetti. <b>3)</b> Modifica di attributi.<span class='ex'><b>Esempio (aggiungiServizio):</b> creata istanza s di Servizio (1); evento «prevede» s (2); s.nome=… (3).</span>"},
 {id:"K5",cat:"Contratti",q:"Cosa sono le pre-condizioni di un contratto?",a:"Ciò che si <b>assume vero PRIMA</b> di eseguire l'operazione (non viene controllato dall'operazione stessa).<span class='ex'><b>Esempio (impostaFrequenza):</b> l'Organizzatore corrente organizza l'evento E evento.stato=«programmato».</span>"},
 {id:"K6",cat:"Contratti",q:"Post-condizione chiave di approvaMenu (BR9) nel tuo progetto?",a:"<b>m.approvato = sì</b>; e <b>se</b> ogni Servizio dell'evento ha un Menu in uso approvato → <b>evento.stato = «in corso»</b> (PROGRAMMED → IN_PROGRESS).<span class='ex'><b>Attenzione:</b> la transizione avviene quando sono TUTTI approvati, non al primo menù.</span>"},

 {id:"DC1",cat:"DCD",q:"Cos'è il Design Class Diagram (DCD)?",a:"Il diagramma delle <b>classi software</b> di design: classi con attributi tipizzati, metodi (firme + visibilità +/−) e relazioni navigabili. È la <b>soluzione software</b>.<span class='ex'><b>Esempio (tuo):</b> EventManager con createEvent(...), Event con areAllMenusApproved(), frecce verso Service.</span>"},
 {id:"DC2",cat:"DCD",q:"Differenza tra DCD e Modello di Dominio?",a:"<b>Modello di Dominio</b> = concetti del mondo reale (concettuale, senza metodi). <b>DCD</b> = classi software con metodi, tipi, visibilità e navigabilità (la soluzione).<span class='ex'><b>Esempio:</b> «Cliente» concetto → classe <code>Cliente</code> con attributi tipizzati e metodi nel DCD.</span>"},
 {id:"DC3",cat:"DCD",q:"Cosa aggiunge il DCD rispetto al modello di dominio?",a:"<b>Metodi</b> (ricavati da contratti e DSD), <b>tipi</b> degli attributi, <b>visibilità</b> +/−, <b>direzione di navigazione</b> e classi software come il <b>Controller</b>.<span class='ex'><b>Esempio:</b> aggiungi EventManager e i metodi create/approve/terminate che nel dominio non esistevano.</span>"},
 {id:"DC4",cat:"DCD",q:"Chi è il Controller nel tuo DCD e cosa fa?",a:"<b>EventManager</b> — il controller GRASP di UC3. Riceve tutte le operazioni di sistema, delega al modello di dominio e notifica i receiver (Observer).<span class='ex'><b>Esempio:</b> createEvent() recupera l'utente, chiama Event.create(...), poi notifica updateEventCreated.</span>"},
 {id:"DC5",cat:"DCD",q:"Perché nel tuo DCD User è una classe unica e non una gerarchia?",a:"Per <b>semplificare la persistenza</b>: una sola tabella con campo <code>role</code>; i controlli si fanno con <code>isChef()</code>/role invece del polimorfismo di una gerarchia Organizzatore/Chef/Cuoco.<span class='ex'><b>Divergenza voluta</b> dal modello di dominio, motivata nel documento.</span>"},

 {id:"DD1",cat:"DSD",q:"Cos'è un Design Sequence Diagram (DSD)?",a:"Un diagramma di sequenza che mostra <b>come gli oggetti software collaborano</b> (chi chiama chi, con quali messaggi) per realizzare un'operazione di sistema. È <b>white-box</b>.<span class='ex'><b>Esempio (tuo):</b> creaEvento → EventManager chiama UserManager, poi Event.create, poi i receiver.</span>"},
 {id:"DD2",cat:"DSD",q:"Differenza tra SSD e DSD?",a:"<b>SSD</b>: sistema black-box, una sola lifeline, eventi dall'attore. <b>DSD</b>: white-box, una lifeline per ogni oggetto, mostra le chiamate interne.<span class='ex'><b>Memo:</b> SSD = cosa chiede l'attore; DSD = come gli oggetti se la sbrigano dentro.</span>"},
 {id:"DD3",cat:"DSD",q:"Da cosa parte un DSD e chi riceve il primo messaggio?",a:"Parte da un'<b>operazione di sistema</b> (presa da SSD/contratto). Il primo messaggio arriva al <b>Controller</b>.<span class='ex'><b>Esempio:</b> approveMenu(serviceId) entra in EventManager, che poi smista a Service ed Event.</span>"},
 {id:"DD4",cat:"DSD",q:"Cosa sono i frame opt, alt e loop in un diagramma di sequenza?",a:"<b>opt</b> = blocco opzionale (eseguito se vale una condizione). <b>alt</b> = rami alternativi (if/else). <b>loop</b> = ciclo ripetuto.<span class='ex'><b>Esempio (tuo):</b> terminaEvento usa <b>opt</b> per note/documentazione; decisioneDeroga usa <b>alt</b> su applicaPenale; impostaFrequenza usa <b>loop</b> sulle date.</span>"},
 {id:"DD5",cat:"DSD",q:"Qual è la sequenza del DSD creaEvento nel tuo progetto?",a:"EventManager → <code>UserManager.getCurrentUser()</code> → <code>Event.create(...)</code> → set cliente e organizzatore → <code>notifyEventCreated(e)</code> → <b>loop</b> sui receiver: <code>updateEventCreated(e)</code> → ritorna e.<span class='ex'>La persistenza è dentro EventPersistence e non si mostra nel DSD.</span>"},

 {id:"A6",cat:"Processi",q:"Cos'è il modello di sviluppo a spirale?",a:"Un modello <b>iterativo guidato dal rischio</b>: a ogni giro (spirale) si individuano e si riducono i rischi maggiori prima di proseguire, costruendo prototipi successivi.<span class='ex'><b>Esempio:</b> prima di costruire tutto, fai un prototipo della parte più rischiosa (es. l'integrazione col pagamento) per abbattere l'incertezza.</span>"},
 {id:"A7",cat:"Processi",q:"Cos'è Scrum e cos'è uno «sprint»?",a:"<b>Scrum</b> è un metodo <b>agile</b>: lo sviluppo procede in iterazioni brevi dette <b>sprint</b>; all'inizio di ogni sprint il team pianifica il lavoro dell'iterazione corrente.<span class='ex'><b>Esempio:</b> sprint di 2 settimane → all'inizio scegli cosa fare, alla fine consegni un incremento funzionante.</span>"},

 {id:"B4",cat:"Requisiti",q:"Cos'è il modello FURPS+ dei requisiti?",a:"Una classificazione dei requisiti: <b>F</b>unzionale, <b>U</b>sabilità, Affidabilità (<b>R</b>eliability), <b>P</b>restazioni, <b>S</b>ostenibilità, <b>+</b> altri vincoli (progetto, hardware, legali…).<span class='ex'><b>Memo:</b> la F = requisiti funzionali; U-R-P-S-+ = requisiti non funzionali (qualità e vincoli).</span>"},
 {id:"B5",cat:"Requisiti",q:"A cosa servono le relazioni «include» ed «extend» tra casi d'uso?",a:"<b>include</b> = un caso d'uso ne usa <i>sempre</i> un altro come sotto-parte comune (fattorizzazione). <b>extend</b> = un caso d'uso aggiunge un comportamento <i>opzionale</i> a un altro, solo in certe condizioni.<span class='ex'><b>Esempio:</b> «Paga» <i>include</i> «Autentica»; «Acquista» è <i>esteso</i> da «Applica coupon».</span>"},

 {id:"DC6",cat:"DCD",q:"Quali relazioni UML compaiono in un diagramma delle classi?",a:"<b>Associazione</b> (un oggetto conosce/usa un altro), <b>aggregazione</b> (◇ insieme «debole»), <b>composizione</b> (◆ insieme «forte»: il tutto possiede le parti), <b>generalizzazione</b> (▷ ereditarietà), <b>realizzazione</b> (▷ tratteggiata: implementa un'interfaccia), <b>dipendenza</b> (- -> usa temporaneamente).<span class='ex'><b>Esempio (tuo):</b> Event ◆— Service (composizione); Recipe ▷ KitchenProcess (realizzazione).</span>"},

 {id:"AR1",cat:"Architettura",q:"Cos'è l'architettura a strati (layered)?",a:"La suddivisione di un sistema complesso in <b>strati</b> con responsabilità distinte (es. Presentazione/UI, Logica di dominio, Persistenza), dove ogni strato usa solo quello sottostante.<span class='ex'><b>Esempio (tuo):</b> UI → dominio (EventManager, Event) → persistenza (EventPersistence): la logica di business non conosce l'interfaccia grafica.</span>"},
 {id:"AR2",cat:"Architettura",q:"Cos'è il principio di separazione Modello-Vista?",a:"Il <b>Modello</b> (logica e dati del dominio) non deve dipendere dalla <b>Vista</b> (interfaccia): il modello non conosce la UI né vi è accoppiato.<span class='ex'><b>Perché:</b> puoi cambiare o aggiungere interfacce (CLI, web) senza toccare la logica → favorisce Low Coupling. Nel tuo progetto l'Observer disaccoppia dominio e persistenza in modo analogo.</span>"},

 {id:"LU1",cat:"Luna's Notes",q:"Disegna il <b>modello di dominio</b>: «un catalogo è costituito da più descrizioni di prodotto (identificatore, descrizione, prezzo); ogni catalogo è utilizzato da più negozi (nome, indirizzo)».",a:"<b>Catalogo_di_prodotti</b> ◆—«costituita da» 1..* <b>DescrizioneProdotto</b> (composizione); Catalogo 1 —«utilizzato in»→ 0..* <b>Negozio</b>. Solo concetti e attributi, <b>nessun metodo</b> (è concettuale, mondo reale).<span class='ex'><b>Trappola:</b> niente operazioni nel modello di dominio.</span><img src='notes/dominio_catalogo.jpg' alt='Modello di dominio catalogo'>"},
 {id:"LU2",cat:"Luna's Notes",q:"Disegna l'<b>SSD</b> dello scenario «Elabora Vendita». Quali sono le operazioni di sistema?",a:"L'Attore manda a <b>:Sistema</b> (scatola nera): <code>iniziaVendita()</code>, poi in <b>loop</b> <code>inserimentoArticolo(ID, quantità)</code> → descrizione/prezzo/totale, <code>fineVendita()</code> → totale, <code>pagamento(costo)</code> → resto/ricevuta.<span class='ex'><b>Rumore bianco:</b> non tutti i passi dello scenario diventano operazioni di sistema.</span><img src='notes/ssd_vendita.png' alt='SSD Elabora Vendita'>"},
 {id:"LU3",cat:"Luna's Notes",q:"Scrivi pre- e post-condizioni del contratto di <code>enterItem(itemID, quantity)</code>.",a:"<b>Pre:</b> è in corso una vendita <i>s</i>.<br><b>Post:</b> creata istanza <i>sli</i> di SalesLineItem; <i>sli</i> associata alla Sale corrente <i>s</i>; <i>sli</i> associata a una ProductDescription (in base al match con itemID); <i>sli.quantity</i> = quantity.<span class='ex'>Le <b>post-condizioni</b> fotografano lo stato DOPO (dichiarative), con 3 tipi di cambiamento: <b>creazione</b> di istanze, <b>associazioni</b>, modifica di <b>attributi</b>.</span>"},
 {id:"LU4",cat:"Luna's Notes",q:"DSD di <code>enterItem</code>: <code>:SaleJFrame</code> riceve <code>actionPerformed(...)</code>. A chi delega? Chi è il <b>controller</b> GRASP?",a:"<code>actionPerformed</code> → <b>:SaleJFrame</b> (UI) → <code>enterItem(itemID, qty)</code> → <b>:Register</b> → <code>makeLineItem(itemID, qty)</code> → <b>:Sale</b>.<span class='ex'>Strato UI = SaleJFrame; strato di dominio = Register e Sale. Il <b>controller GRASP è Register</b>.</span><img src='notes/dsd_register.png' alt='DSD Register enterItem'>"},
 {id:"LU5",cat:"Luna's Notes",q:"DCD: «una vendita è saldata da 1 pagamento; un pagamento salda 1 sola vendita; il pagamento può essere in contanti, con assegno o con carta». Che cardinalità?",a:"<b>Sale</b> 1 —<i>settled</i>— 1 <b>Payment</b>{abstract}(quantity:double); Payment è generalizzato (△) da <b>PaymentWithCash</b>, <b>PaymentWithAllowance</b>, <b>PaymentWithCreditCard</b>.<span class='ex'><b>Cardinalità 1–1:</b> la vendita è obbligatoriamente saldata e un pagamento salda una sola vendita.</span><img src='notes/dcd_payment.png' alt='DCD Sale Payment'>"},
 {id:"LU6",cat:"Luna's Notes",q:"Quale pattern GoF è realizzato da questo codice? <img src='notes/decorator_code.jpg' alt='Codice Decorator'>",a:"<b>Decorator</b>. <b>FiguraColorata</b> avvolge un <b>Figure</b> (component) e aggiunge dinamicamente responsabilità (ColoreBordo, ColoreSfondo) senza moltiplicare le sottoclassi.<span class='ex'>Regola delle note: «quando si aggiungono nuove funzionalità, di solito è Decorator».</span><img src='notes/decorator_uml.png' alt='UML Decorator'>"},
 {id:"LU7",cat:"Luna's Notes",q:"Quale pattern GoF è realizzato da questo codice? <img src='notes/composite_code.jpg' alt='Codice Composite'>",a:"<b>Composite</b>. <b>Menu</b> (composto) e <b>MenuItem</b> (foglia) implementano la stessa interfaccia <b>MenuElement</b>; solo il composto ridefinisce <code>add()</code>, mentre la foglia eredita l'<code>add()</code> astratto che lancia <code>UnsupportedOperationException</code>.<span class='ex'>Strutture ad albero / ricorsive: composto e foglia trattati allo stesso modo.</span><img src='notes/composite_uml.png' alt='UML Composite'>"},
 {id:"LU8",cat:"Luna's Notes",q:"Quale pattern GoF è realizzato da questo codice? <img src='notes/strategy_code.jpg' alt='Codice Strategy'>",a:"<b>Strategy</b>. <b>CompressionContext</b> tiene un <b>CompressionAlgorithm</b> (Zip/Rar) dietro un'interfaccia comune e può cambiarlo a runtime con <code>setCompressionAlgorithm()</code>.<span class='ex'>Si usa quando ci sono più algoritmi intercambiabili che fanno la stessa cosa in modi diversi.</span><img src='notes/strategy_uml.png' alt='UML Strategy'>"},
 {id:"LU9",cat:"Luna's Notes",q:"Quale pattern GoF è realizzato da questo codice? <img src='notes/visitor_code.jpg' alt='Codice Visitor'>",a:"<b>Visitor</b>. Un'operazione (calcolo del prezzo) va eseguita su elementi diversi — <b>MerceVendutaInPezzi</b> e <b>MerceVendutaAPeso</b> — trattati in modo diverso. Doppio dispatch: <code>merce.accept(scanner)</code> → <code>scanner.scan(this)</code>.<span class='ex'><b>ScannerPerCarrello</b> è il visitor concreto.</span><img src='notes/visitor_uml.png' alt='UML Visitor'>"},
 {id:"LU10",cat:"Luna's Notes",q:"Quale pattern GoF è realizzato da questo codice? <img src='notes/state_code.jpg' alt='Codice State'>",a:"<b>State</b>. <b>Mammoth</b> delega al <b>Behavior</b> corrente (<b>PeacefulBehavior</b> / <b>AngryBehavior</b>); con <code>changeBehaviorTo()</code> il comportamento cambia al cambiare dello stato.<span class='ex'>Si riconosce dal «pulsante» che cambia stato (qui <code>timePasses()</code>).</span><img src='notes/state_uml.png' alt='UML State'>"},
 {id:"LU11",cat:"Luna's Notes",q:"Quale pattern GoF è realizzato da questo codice? <img src='notes/observer_code.jpg' alt='Codice Observer'>",a:"<b>Observer</b>. <b>MessageContainer</b> (subject) mantiene una lista di <b>MessageView</b> (observer), con <code>attach()</code>/<code>detach()</code> e <code>show(m)</code> che notifica tutti.<span class='ex'>Sempre presenti: metodo per iscriversi/disiscriversi + metodo di notifica.</span><img src='notes/observer_uml.png' alt='UML Observer'>"},
 {id:"LU12",cat:"Luna's Notes",q:"Quale pattern GoF è realizzato da questo codice? <img src='notes/adapter_code.jpg' alt='Codice Adapter'>",a:"<b>Adapter</b>. <b>BankCustomer</b> (adapter) implementa l'interfaccia target <b>CreditCard</b> e avvolge <b>BankDetail</b> (adaptee), convertendone l'interfaccia.<span class='ex'>È la versione «a oggetti», preferita a quella «a classi» (ma il prof. può chiedere entrambe).</span><img src='notes/adapter_uml.png' alt='UML Adapter'>"},
 {id:"LU13",cat:"Luna's Notes",q:"Come riconosci <b>Singleton</b> e <b>Abstract Factory</b> dal codice?",a:"<b>Singleton:</b> una classe con un metodo (spesso statico) che restituisce l'istanza esistente se non è <code>null</code>, altrimenti ne crea una nuova → <b>una sola istanza</b>.<br><b>Abstract Factory:</b> serve a <b>creare oggetti</b> (famiglie di oggetti correlati) e <b>non</b> è il Singleton.<span class='ex'>Nelle note non hanno UML: si riconoscono dal comportamento nel codice.</span>"},
];

const LS="flashSAS.progress.v1";
let progress = JSON.parse(localStorage.getItem(LS)||"{}"); // id -> "known"|"again"
let onlyAgain=false;
let deck=[], i=0, flipped=false;

const $=id=>document.getElementById(id);
const card=$("card");

function cats(){return ["Tutte",...[...new Set(CARDS.map(c=>c.cat))]];}
function buildCatSelect(){
  $("cat").innerHTML=cats().map(c=>`<option>${c}</option>`).join("");
}

// Rebuild deck from current filter + onlyAgain. Resets position. Optionally shuffles.
function rebuildDeck({shuffle=false}={}){
  const sel=$("cat").value||"Tutte";
  deck=CARDS.filter(c=>(sel==="Tutte"||c.cat===sel)&&(!onlyAgain||progress[c.id]==="again"));
  if(shuffle){
    for(let j=deck.length-1;j>0;j--){const r=Math.floor(Math.random()*(j+1));[deck[j],deck[r]]=[deck[r],deck[j]];}
  }
  i=0;
  showCard();
}

// Render the current card WITHOUT touching deck order (so shuffle survives nav).
function showCard(){
  const n=deck.length;
  setFlip(false);
  if(n===0){
    $("q").innerHTML='<span class="empty">Nessuna card in questo filtro 🎉<br>(niente da rivedere o categoria vuota)</span>';
    $("a").innerHTML=""; $("catChip").textContent="—"; $("qid").textContent="";
    $("counter").textContent="0 / 0"; $("bar").style.width="0%";
    updateMarks(); updateStats(); return;
  }
  if(i<0)i=n-1; if(i>=n)i=0;
  const c=deck[i];
  $("catChip").textContent=c.cat;
  $("qid").textContent="Card "+c.id;
  $("q").innerHTML=c.q;
  $("a").innerHTML=c.a;
  $("counter").textContent=(i+1)+" / "+n;
  $("bar").style.width=((i+1)/n*100)+"%";
  updateMarks(); updateStats();
}

function setFlip(v){flipped=v;card.classList.toggle("flip",v);}
function toggleFlip(){setFlip(!flipped);}
function next(){if(deck.length){i=(i+1)%deck.length;showCard();}}
function prev(){if(deck.length){i=(i-1+deck.length)%deck.length;showCard();}}

function mark(state){
  if(!deck.length)return;
  const id=deck[i].id;
  if(progress[id]===state) delete progress[id]; else progress[id]=state; // toggle
  localStorage.setItem(LS,JSON.stringify(progress));
  updateMarks(); updateStats();
  if(state==="known"){
    if(onlyAgain){ rebuildDeck(); }
    else { setTimeout(next,180); }
  }
}
function updateMarks(){
  const id=deck.length?deck[i].id:null;
  const st=id?progress[id]:null;
  const label = st==="known"?"✔ sapevo":st==="again"?"↻ da rivedere":"";
  for(const el of [$("markFront"),$("markBack")]){
    el.textContent=label;
    el.className="markstate"+(st?(" "+st):"");
  }
}
function updateStats(){
  let k=0,a=0;
  for(const v of Object.values(progress)){if(v==="known")k++;else if(v==="again")a++;}
  $("nKnown").textContent=k; $("nAgain").textContent=a;
}

// events
card.addEventListener("click",toggleFlip);
$("flip").onclick=toggleFlip;
$("next").onclick=next;
$("prev").onclick=prev;
$("markKnown").onclick=()=>mark("known");
$("markAgain").onclick=()=>mark("again");
$("shuffle").onclick=()=>rebuildDeck({shuffle:true});
$("cat").onchange=()=>rebuildDeck();
$("onlyAgain").onclick=()=>{onlyAgain=!onlyAgain;$("onlyAgain").style.borderColor=onlyAgain?"var(--accent)":"";rebuildDeck();};
$("reset").onclick=()=>{if(confirm("Azzerare tutti i progressi (sapevo / da rivedere)?")){progress={};localStorage.removeItem(LS);rebuildDeck();}};
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="SELECT")return;
  if(e.key==="ArrowRight")next();
  else if(e.key==="ArrowLeft")prev();
  else if(e.key===" "){e.preventDefault();toggleFlip();}
  else if(e.key==="g"||e.key==="G")mark("known");
  else if(e.key==="a"||e.key==="A")mark("again");
  else if(e.key==="s"||e.key==="S")rebuildDeck({shuffle:true});
});

buildCatSelect();
rebuildDeck();
</script>
