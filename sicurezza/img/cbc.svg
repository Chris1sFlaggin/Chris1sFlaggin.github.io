<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" font-family="system-ui,Segoe UI,Arial">
<rect width="560" height="200" fill="#ffffff"/>
<defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#26324a"/></marker></defs>
<style>text{fill:#1a2233}.t{font-size:15px;font-weight:700}.c{font-size:12px;fill:#5a6678}
.box{fill:#eef2fb;stroke:#26324a;stroke-width:1.5}.e{fill:#d6e2ff;stroke:#2b50a0;stroke-width:2}
.io{fill:#eafaf3;stroke:#1f8f6f;stroke-width:1.5}line{stroke:#26324a;stroke-width:1.6;marker-end:url(#a)}</style>
<text class="t" x="20" y="26" font-size="15">CBC — Cipher Block Chaining</text><rect class="io" x="18" y="80" width="104" height="40" rx="6"/><text class="t" x="70" y="105" text-anchor="middle" font-size="12">IV / C&#8202;i&#8722;1</text><rect class="box" x="164" y="24" width="72" height="32" rx="6"/><text class="t" x="200" y="45" text-anchor="middle" font-size="13">P&#8202;i</text><circle cx="200" cy="100" r="14" fill="#fff" stroke="#26324a" stroke-width="1.6"/><text x="200" y="105" text-anchor="middle" font-size="16">⊕</text><line x1="122" y1="100" x2="186" y2="100"/><line x1="200" y1="56" x2="200" y2="86"/><line x1="214" y1="100" x2="258" y2="100"/><rect class="e" x="258" y="76" width="64" height="48" rx="6"/><text class="t" x="290" y="101" text-anchor="middle">E</text><text class="c" x="290" y="115" text-anchor="middle">chiave k</text><line x1="322" y1="100" x2="394" y2="100"/><rect class="io" x="394" y="82" width="72" height="36" rx="6"/><text class="t" x="430" y="105" text-anchor="middle" font-size="13">C&#8202;i</text><text class="c" x="280" y="190" text-anchor="middle">Pi messo in XOR col cifrato precedente (IV sul 1º) prima di cifrare. Ci alimenta il blocco dopo.</text></svg>