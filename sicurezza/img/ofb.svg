<text class="t" x="20" y="26" font-size="15">OFB — Output Feedback (→ cifrario a flusso)</text><rect class="io" x="12" y="80" width="104" height="40" rx="6"/><text class="t" x="64" y="105" text-anchor="middle" font-size="12">IV / O&#8202;i&#8722;1</text><line x1="116" y1="100" x2="258" y2="100"/><rect class="e" x="258" y="76" width="64" height="48" rx="6"/><text class="t" x="290" y="101" text-anchor="middle">E</text><text class="c" x="290" y="115" text-anchor="middle">chiave k</text><rect class="box" x="327" y="24" width="66" height="32" rx="6"/><text class="t" x="360" y="45" text-anchor="middle" font-size="13">P&#8202;i</text><circle cx="360" cy="100" r="14" fill="#fff" stroke="#26324a" stroke-width="1.6"/><text x="360" y="105" text-anchor="middle" font-size="16">⊕</text><line x1="322" y1="100" x2="346" y2="100"/><line x1="360" y1="56" x2="360" y2="86"/><line x1="374" y1="100" x2="420" y2="100"/><rect class="io" x="420" y="82" width="72" height="36" rx="6"/><text class="t" x="456" y="105" text-anchor="middle" font-size="13">C&#8202;i</text><text class="c" x="334" y="92" text-anchor="middle">O&#8202;i</text><text class="c" x="280" y="190" text-anchor="middle">L'output del cifrario (keystream) alimenta il blocco dopo: indipendente dal messaggio. 1 bit errato = danno locale.</text></svg>