<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 250" font-family="system-ui,Segoe UI,Arial"><rect width="560" height="250" fill="#ffffff"/><defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#26324a"/></marker></defs><style>text{fill:#1a2233}.t{font-weight:700}.c{font-size:11px;fill:#5a6678}.box{fill:#eef2fb;stroke:#26324a;stroke-width:1.4}.op{fill:#d6e2ff;stroke:#2b50a0;stroke-width:1.6}.io{fill:#eafaf3;stroke:#1f8f6f;stroke-width:1.4}.bad{fill:#ffe9e9;stroke:#c0392b;stroke-width:1.6}line{stroke:#26324a;stroke-width:1.5;marker-end:url(#a)}</style><text class="t" x="20" y="26" text-anchor="start" font-size="15">ARP poisoning (man-in-the-middle)</text><rect class="box" x="30" y="94" width="120" height="52" rx="6"/><text class="t" x="90" y="120" text-anchor="middle" font-size="13">Vittima</text><text class="c" x="90" y="135" text-anchor="middle">cache: GW = MAC attaccante</text><rect class="bad" x="220" y="94" width="120" height="52" rx="6"/><text class="t" x="280" y="120" text-anchor="middle" font-size="13">Attaccante</text><text class="c" x="280" y="135" text-anchor="middle">intercetta</text><rect class="box" x="415" y="94" width="110" height="52" rx="6"/><text class="t" x="470" y="120" text-anchor="middle" font-size="13">Gateway</text><text class="c" x="470" y="135" text-anchor="middle">router</text><line x1="232" y1="158" x2="152" y2="158"/><text class="c" x="192" y="178" text-anchor="middle" font-size="11">ARP falso:</text><text class="c" x="192" y="190" text-anchor="middle" font-size="11">IP(GW) &#8594; MAC(attaccante)</text><line x1="152" y1="96" x2="220" y2="96"/><line x1="340" y1="96" x2="412" y2="96"/><text class="c" x="280" y="86" text-anchor="middle" font-size="11">traffico deviato</text><text class="c" x="280" y="232" text-anchor="middle" font-size="11">La cache ARP della vittima lega l'IP del gateway al MAC dell'attaccante: il traffico passa da lui.</text></svg>